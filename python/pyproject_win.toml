# Windows variant of sglang-kt. Mirrors python/pyproject.toml, minus deps
# that have no Windows wheel or are POSIX-only, plus minor pin relaxations
# so the existing flashinfer .venv (torch 2.11.0+cu128) can host sglang
# without a ~2 GB torch re-download.
#
# Usage (on Windows, in a pre-configured venv that already has a working
# torch + flashinfer editable install):
#
#   cd C:\sglang\python
#   Copy-Item pyproject_win.toml pyproject.toml -Force
#   pip install -e . --no-build-isolation
#
# Dropped vs pyproject.toml (all Linux-only or Windows-hostile):
#   uvloop, torch_memory_saver, nvidia-cutlass-dsl, quack-kernels,
#   torchcodec, flashinfer_cubin, decord2, st_attn, vsa, checkpoint-engine
#
# Sourced from local paths (installed separately):
#   flashinfer_python  -> C:\flashinfer    (`pip install -e`)
#   sgl-kernel         -> C:\sglang\sgl-kernel  (built per Stage 4/5)
#
# Relaxed pins (Windows venv currently ships torch 2.11.0+cu128):
#   torch/torchvision/torchaudio   >=2.9,<2.13
#   torchao                        >=0.9

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sglang-kt"
dynamic = ["version"]
description = "SGLang is a fast serving framework for large language models and vision language models."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Apache Software License",
]

dependencies = [
  "IPython",
  "aiohttp",
  "apache-tvm-ffi>=0.1.5,<0.2",
  "anthropic>=0.20.0",
  "blobfile==3.0.0",
  "build",
  "compressed-tensors",
  "cuda-python==12.9",
  "datasets",
  "einops",
  "fastapi",
  "gguf",
  "hf_transfer",
  "huggingface_hub",
  "interegular",
  "llguidance>=0.7.11,<0.8.0",
  "modelscope",
  "msgspec",
  "ninja",
  "numpy",
  "nvidia-ml-py",
  "openai-harmony==0.0.4",
  "openai==2.6.1",
  "orjson",
  "outlines==0.1.11",
  "packaging",
  "partial_json_parser",
  "pillow",
  "prometheus-client>=0.20.0",
  "psutil",
  "py-spy",
  "pybase64",
  "pydantic",
  "python-multipart",
  "pyzmq>=25.1.2",
  "requests",
  "scipy",
  "sentencepiece",
  "setproctitle",
  "soundfile==0.13.1",
  "tiktoken",
  "timm==1.0.16",
  "torch>=2.9,<2.13",
  "torchao>=0.9",
  "torchaudio>=2.9,<2.13",
  "torchvision",
  "tqdm",
  "transformers==4.57.1",
  "triton-windows>=3.5",
  "uvicorn",
  "xgrammar==0.1.27",

  "smg-grpc-proto>=0.3.3",
  "grpcio>=1.78.0",
  "grpcio-reflection>=1.78.0",
]

[project.optional-dependencies]
runtime_common = [
  "IPython",
  "anthropic>=0.20.0",
  "blobfile==3.0.0",
  "build",
  "compressed-tensors",
  "datasets",
  "fastapi",
  "hf_transfer",
  "huggingface_hub",
  "interegular",
  "llguidance>=0.7.11,<0.8.0",
  "modelscope",
  "ninja",
  "openai==2.6.1",
  "openai-harmony==0.0.4",
  "orjson",
  "outlines==0.1.11",
  "packaging",
  "partial_json_parser",
  "pillow",
  "prometheus-client>=0.20.0",
  "psutil",
  "py-spy",
  "pybase64",
  "pydantic",
  "pynvml",
  "python-multipart",
  "pyzmq>=25.1.2",
  "sentencepiece",
  "soundfile==0.13.1",
  "scipy",
  "timm==1.0.16",
  "tiktoken",
  "tqdm",
  "transformers==4.57.1",
  "uvicorn",
  "xgrammar==0.1.27",
]
tracing = [
  "opentelemetry-sdk",
  "opentelemetry-api",
  "opentelemetry-exporter-otlp",
  "opentelemetry-exporter-otlp-proto-grpc",
]
test = [
  "accelerate",
  "expecttest",
  "jsonlines",
  "matplotlib",
  "pandas",
  "peft",
  "sentence_transformers",
  "pytest",
]
all = ["sglang-kt[runtime_common,tracing]"]
dev = ["sglang-kt[all,test]"]

[project.scripts]
sglang = "sglang.cli.main:main"

[project.urls]
"Homepage" = "https://github.com/sgl-project/sglang"
"Bug Tracker" = "https://github.com/sgl-project/sglang/issues"

[tool.setuptools.package-data]
"sglang" = [
  "srt/**/*",
  "jit_kernel/**/*"
]

[tool.setuptools.packages.find]
exclude = [
  "assets*",
  "benchmark*",
  "docs*",
  "dist*",
  "playground*",
  "scripts*",
  "tests*",
]

[tool.wheel]
exclude = [
  "assets*",
  "benchmark*",
  "docs*",
  "dist*",
  "playground*",
  "scripts*",
  "tests*",
]
